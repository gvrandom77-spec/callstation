name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libsqlite3-dev libbz2-dev libmpdec-dev libffi-dev libtinfo5
        pip install --upgrade pip
        pip install "buildozer==1.5.0" "cython<3.0"

    - name: Pre-clean broken python tests
      run: |
        # Удаляем папки с тестами из python-for-android до начала компиляции
        python3 -c "
        import os, glob
        for d in glob.glob('/home/runner/.local/**/lib2to3/tests', recursive=True):
            print(f'Removing: {d}')
            os.system(f'rm -rf {d}')
        " || true

    - name: Build with Buildozer
      run: |
        yes | buildozer android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: package
        path: bin/*.apk
